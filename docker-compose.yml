# Local HTTPS preview of the static export, trusted by the browser without
# installing anything on the host.
#
#   pnpm build            # produce ./out
#   pnpm preview:docker   # trust the CA + serve https://localhost:4322
#
# The `trust` service (has certutil + mkcert inside the container) issues the
# localhost cert and installs the local CA into your browser NSS stores, then the
# `web` service serves ./out over HTTPS. Nothing is installed on the host.
services:
    trust:
        build:
            context: ./docker
            dockerfile: Dockerfile.trust
        # Run as the host user so files written into your home stay yours.
        user: '${HOST_UID:-1000}:${HOST_GID:-1000}'
        environment:
            HOSTHOME: /host
            CERTS: /certs
        volumes:
            # Mounted so the CA can be installed into whichever browser trust
            # stores exist (Chrome/Chromium, Firefox, snap variants).
            - '${HOME}:/host'
            - ./certificates:/certs

    web:
        image: nginx:alpine
        depends_on:
            trust:
                condition: service_completed_successfully
        ports:
            - '4322:443'
        volumes:
            - ./out:/usr/share/nginx/html:ro
            - ./certificates:/etc/nginx/certs:ro
            - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
