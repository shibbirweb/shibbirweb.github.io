# Serves the static export (./out) over HTTPS with the mkcert cert, mimicking
# GitHub Pages: extensionless paths resolve to their `.html` file so routes,
# /sw.js and /version.json all work like production.
server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # .webmanifest is not in nginx's default mime map; set it here without
    # replacing the inherited types (a server-level `types {}` block would wipe
    # text/html etc. and make the browser download pages instead of rendering).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
    }

    # The client polls version.json to detect a new deploy; never cache it.
    location = /version.json {
        add_header Cache-Control "no-store" always;
        try_files /version.json =404;
    }

    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
}
